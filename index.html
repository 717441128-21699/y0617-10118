<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播电商选品与运营管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🎬</div>
                <div class="logo-text">直播运营中心</div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">数据概览</span>
                </div>
                <div class="nav-item" data-page="plans">
                    <span class="nav-icon">📅</span>
                    <span class="nav-label">直播计划</span>
                </div>
                <div class="nav-item" data-page="products">
                    <span class="nav-icon">🛍️</span>
                    <span class="nav-label">商品管理</span>
                </div>
                <div class="nav-item" data-page="live">
                    <span class="nav-icon">🔴</span>
                    <span class="nav-label">直播中控</span>
                </div>
                <div class="nav-item" data-page="reports">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">复盘报告</span>
                </div>
                <div class="nav-item" data-page="assistant">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-label">选品助手</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">🎤</div>
                    <div class="user-detail">
                        <div class="user-name">运营管理员</div>
                        <div class="user-role">超级管理员</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="pageTitle">数据概览</h1>
                    <p id="pageSubtitle">查看直播运营核心数据指标</p>
                </div>
                <div class="top-actions">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="搜索商品、直播场次...">
                    </div>
                    <button class="btn btn-primary" id="quickCreateBtn">
                        <span>+</span> 新建直播计划
                    </button>
                </div>
            </header>

            <div class="content-area" id="contentArea">
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
